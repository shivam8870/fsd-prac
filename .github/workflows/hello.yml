name: CI Workflow

on:
  push:
  pull_request:

jobs:
  say-hello:
    runs-on: ubuntu-latest
    steps:
      - name: Print Hello
        run: echo "Hello from 1st job"

  say-bye:
    needs: say-hello
    runs-on: ubuntu-latest
    steps:
      - name: Print Bye
        run: echo "bye from 2nd job"